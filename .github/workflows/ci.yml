name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  typecheck-api:
    name: Typecheck API
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Install dependencies
        run: npm install
      - name: Typecheck API
        run: npm run typecheck -w packages/api

  typecheck-web:
    name: Typecheck Web
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Install dependencies
        run: npm install
      - name: Typecheck Web
        run: npm run typecheck -w packages/web

  build-api:
    name: Build API
    runs-on: ubuntu-latest
    needs: typecheck-api
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Install dependencies
        run: npm install
      - name: Build API
        run: npm run build -w packages/api

  build-web:
    name: Build Web
    runs-on: ubuntu-latest
    needs: typecheck-web
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Install dependencies
        run: npm install
      - name: Build Web
        run: npm run build -w packages/web
